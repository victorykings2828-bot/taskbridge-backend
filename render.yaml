services:
  - type: web
    name: taskbridge-api
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Set these in the Render dashboard → Environment (not stored here for security):
      # MONGODB_URI, JWT_ACCESS_SECRET, JWT_REFRESH_SECRET, COOKIE_SECRET
      # FRONTEND_URL=https://taskbridge-frontend-sandy.vercel.app
